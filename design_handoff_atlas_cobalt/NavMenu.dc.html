<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
</helmet>
<div style="{{ sRoot }}">
  <div style="{{ sBrand }}">
    <dc-import name="AtlasMark" grad-from="{{ gradFrom }}" grad-to="{{ gradTo }}" solid="#141821" size="26" hint-size="26px,26px"></dc-import>
    <div>
      <div style="{{ sWord }}">ATLAS</div>
      <div style="{{ sBy }}">BY SLIDEROBES</div>
    </div>
  </div>
  <sc-for list="{{ sections }}" as="sec" hint-placeholder-count="5">
    <div style="{{ sSection }}">
      <div style="{{ sSecLabel }}">{{ sec.title }}</div>
      <sc-for list="{{ sec.items }}" as="it" hint-placeholder-count="4">
        <div style="{{ it.rowStyle }}">
          <span style="{{ it.iconStyle }}">{{ it.icon }}</span>
          <span style="{{ it.labelStyle }}">{{ it.label }}</span>
        </div>
      </sc-for>
    </div>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:256,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2563EB&quot;},&quot;gradFrom&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2563EB&quot;},&quot;gradTo&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#38BDF8&quot;}}">
class Component extends DCLogic {
  rgba(hex, a) {
    const h = (hex || '#000').replace('#', '');
    const n = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
    return `rgba(${parseInt(n.slice(0,2),16)},${parseInt(n.slice(2,4),16)},${parseInt(n.slice(4,6),16)},${a})`;
  }
  renderVals() {
    const accent = this.props.accent || '#2563EB';
    const gradFrom = this.props.gradFrom || '#2563EB';
    const gradTo = this.props.gradTo || '#38BDF8';
    const font = "'Manrope', system-ui, sans-serif";
    const iconColor = '#6B7280', text = '#3D4451', label = '#9AA2B0';

    const raw = [
      ['GENERAL', [['Dashboard', 'speed'], ['Calendar', 'calendar_month'], ['Reports', 'bar_chart']]],
      ['PROJECTS', [['Active', 'space_dashboard'], ['Sales', 'sell', true], ['Customers', 'group'], ['Map', 'view_column'], ['Gantt', 'view_timeline']]],
      ['PRODUCTS & STOCK', [['Products', 'inventory_2'], ['Stock Take', 'fact_check'], ['Shortages', 'warning'], ['Validation', 'schedule']]],
      ['PURCHASE', [['Purchase Orders', 'shopping_cart'], ['Suppliers', 'local_shipping']]],
      ['ACCOUNTING', [['Invoices', 'description'], ['Payments', 'credit_card'], ['Accounts Payable', 'account_balance_wallet'], ['Xero', 'link'], ['Timesheets', 'schedule']]]
    ];

    const iconBase = { fontFamily: "'Material Symbols Outlined'", fontSize: '21px', lineHeight: 1, flex: '0 0 auto', fontVariationSettings: "'opsz' 24, 'wght' 400, 'GRAD' 0, 'FILL' 0" };

    const sections = raw.map(([title, items]) => ({
      title,
      items: items.map(([lbl, icon, active]) => ({
        label: lbl, icon,
        rowStyle: {
          display: 'flex', alignItems: 'center', gap: '13px', padding: '9px 12px', borderRadius: '9px', cursor: 'pointer',
          background: active ? this.rgba(accent, .1) : 'transparent',
          boxShadow: active ? `inset 2.5px 0 0 ${accent}` : 'none'
        },
        iconStyle: { ...iconBase, color: active ? accent : iconColor },
        labelStyle: { fontSize: '14.5px', fontWeight: active ? 700 : 500, color: active ? accent : text }
      }))
    }));

    return {
      gradFrom, gradTo, sections,
      sRoot: { width: '256px', background: '#fff', borderRight: '1px solid #EEEFF2', padding: '18px 14px 26px', fontFamily: font, display: 'flex', flexDirection: 'column', boxShadow: '0 24px 60px rgba(16,20,30,.14)' },
      sBrand: { display: 'flex', alignItems: 'center', gap: '10px', padding: '2px 8px 20px', marginBottom: '4px', borderBottom: '1px solid #F1F2F5' },
      sWord: { fontFamily: this.props.wordFont || "'Chakra Petch', sans-serif", fontWeight: 600, fontSize: '17px', letterSpacing: this.props.wordFont ? '.02em' : '.15em', color: '#141821', lineHeight: 1 },
      sBy: { fontFamily: this.props.wordFont || "'Chakra Petch', sans-serif", fontWeight: 500, fontSize: '7.5px', letterSpacing: '.3em', color: accent, marginTop: '4px' },
      sSection: { paddingTop: '14px', marginTop: '10px', borderTop: '1px solid #F3F4F6', display: 'flex', flexDirection: 'column', gap: '2px' },
      sSecLabel: { fontSize: '10.5px', fontWeight: 700, letterSpacing: '.13em', color: label, padding: '0 12px 8px' }
    };
  }
}
</script>
</body>
</html>
