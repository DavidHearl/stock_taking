<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<svg width="{{ w }}" height="{{ h }}" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;overflow:visible">
  <defs>
    <linearGradient id="{{ gid }}" x1="8" y1="94" x2="74" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="{{ gradFrom }}"></stop>
      <stop offset="1" stop-color="{{ gradTo }}"></stop>
    </linearGradient>
  </defs>
  <polygon points="49,4 60,24 35,63 58,63 66,76 10,76" fill="url(#{{ gid }})"></polygon>
  <polygon points="52,30 60,30 92,92 84,92" fill="{{ solid }}"></polygon>
  <polygon points="4,92 22,92 31,80 13,80" fill="{{ solid }}"></polygon>
</svg>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:150,&quot;height&quot;:150},&quot;gradFrom&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2563EB&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;gradTo&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#38BDF8&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;solid&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#14161C&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:120,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    if (!this._gid) this._gid = 'ag' + Math.random().toString(36).slice(2, 9);
    const size = Number(this.props.size) || 120;
    return {
      gid: this._gid,
      w: size,
      h: size,
      gradFrom: this.props.gradFrom || '#2563EB',
      gradTo: this.props.gradTo || '#38BDF8',
      solid: this.props.solid || '#14161C'
    };
  }
}
</script>
</body>
</html>
