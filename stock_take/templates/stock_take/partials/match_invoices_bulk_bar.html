{% comment %}
Bulk action bar, shown once rows are selected. Sits inside the entity tab nav on
the full inbox page and standalone in the embedded (modal) inbox.
{% endcomment %}
<!-- Bulk action bar (shown when rows are selected) -->
<div class="apay-bulk-bar" id="bulk-bar">
    <span class="apay-bulk-count" id="bulk-count">0 selected</span>
    <div class="apay-bulk-actions">
        <button class="apay-bulk-btn ignore" onclick="bulkAction('ignore')"><i class="bi bi-slash-circle"></i> Ignore</button>
        <button class="apay-bulk-btn danger" onclick="bulkAction('delete')"><i class="bi bi-trash3"></i> Delete</button>
    </div>
    <button class="apay-bulk-clear" onclick="clearSelection()"><i class="bi bi-x-lg"></i></button>
</div>
