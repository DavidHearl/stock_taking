<!-- Modal: Anthill "Orders to Place" -->
<div class="modal" id="anthillOrdersModal">
    <div class="modal-overlay" onclick="closeModal('anthillOrdersModal')"></div>
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Orders to Place (Anthill)</h3>
                <div class="modal-header-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('anthillOrdersModal')">Close</button>
                </div>
            </div>
            <div class="modal-body">
                <!-- Error display -->
                <div id="anthillParseError" class="alert alert-danger" style="display:none;margin:1rem;"></div>
                
                <!-- Results section -->
                <div id="anthillOrdersResults">
                    <div class="anthill-orders-toolbar">
                        <span class="anthill-orders-count-label">
                            <strong id="anthillOrdersCount">&#x2014;</strong> orders awaiting placement
                        </span>
                        <span id="anthillDiffSummary" style="display:none;font-size:.78rem;gap:.4rem;"></span>
                        <span class="anthill-orders-legend">
                            <span class="anthill-legend-item"><span class="badge badge-sm badge-success">Ordered</span> On order / stock</span>
                            <span class="anthill-legend-item"><span class="badge badge-sm badge-info">Added</span> BOM generated</span>
                            <span class="anthill-legend-item"><span class="badge badge-sm badge-warning">Short</span> Items short</span>
                            <span class="anthill-legend-item"><span class="badge badge-sm badge-danger">Missing</span> Not generated</span>
                            <span class="anthill-legend-item"><span class="badge badge-sm badge-neutral">N/A</span> Not required</span>
                        </span>
                        <span id="anthillSyncStatus" class="anthill-sync-status"></span>
                    </div>
                    <div class="anthill-orders-scroll">
                        <table class="table table-sticky anthill-orders-table">
                            <thead>
                                <tr>
                                    <th class="col-customer">Customer</th>
                                    <th>Contract No.</th>
                                    <th class="col-cat">Boards</th>
                                    <th class="col-cat">Accessories</th>
                                    <th class="col-cat">OS Doors</th>
                                    <th class="col-cat">Glass</th>
                                    <th class="col-value">Value (ex VAT)</th>
                                    <th>Fit Date</th>
                                    <th class="col-links">Links</th>
                                    <th class="col-action">Action</th>
                                </tr>
                            </thead>
                            <tbody id="anthillOrdersTbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
