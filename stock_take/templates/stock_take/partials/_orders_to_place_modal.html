<!-- Modal: Anthill "Orders to Place" -->
<div class="modal" id="anthillOrdersModal">
    <div class="modal-overlay" onclick="closeModal('anthillOrdersModal')"></div>
    <div class="modal-dialog" style="max-width:1100px;width:95%;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Orders to Place (Anthill)</h3>
                <div class="modal-header-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('anthillOrdersModal')">Close</button>
                </div>
            </div>
            <div class="modal-body" style="padding:0;">
                <!-- Error display -->
                <div id="anthillParseError" class="alert alert-danger" style="display:none;margin:1rem;"></div>
                
                <!-- Results section -->
                <div id="anthillOrdersResults">
                    <div style="padding:.55rem 1rem;background:var(--bg-secondary);border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;">
                        <span style="font-size:.85rem;color:var(--text-secondary);">
                            <strong id="anthillOrdersCount">&#x2014;</strong> orders awaiting placement
                        </span>
                        <span id="anthillDiffSummary" style="display:none;font-size:.78rem;gap:.4rem;"></span>
                        <span style="display:flex;align-items:center;gap:12px;font-size:.72rem;font-weight:600;letter-spacing:.03em;margin-left:1rem;">
                            <span style="display:flex;align-items:center;gap:4px;"><span class="status-icon success">&#x2713;</span> Ordered</span>
                            <span style="display:flex;align-items:center;gap:4px;"><span class="status-icon warning">&#x2713;</span> Added</span>
                            <span style="display:flex;align-items:center;gap:4px;"><span class="status-icon danger">&#x2717;</span> Missing</span>
                            <span style="display:flex;align-items:center;gap:4px;"><span class="status-icon muted na-tag">N/A</span> Not required</span>
                            <span style="display:flex;align-items:center;gap:4px;"><span class="status-icon muted">&ndash;</span> No info</span>
                        </span>
                        <span id="anthillSyncStatus" style="margin-left:auto;font-size:.75rem;display:flex;align-items:center;gap:5px;"></span>
                    </div>
                    <div class="anthill-orders-scroll">
                        <table class="anthill-orders-table">
                            <thead>
                                <tr>
                                    <th class="col-customer">Customer</th>
                                    <th>Contract No.</th>
                                    <th class="col-cat">Boards</th>
                                    <th class="col-cat">Accessories</th>
                                    <th class="col-cat">OS Doors</th>
                                    <th class="col-cat">Glass</th>
                                    <th class="col-value">Value (ex VAT)</th>
                                    <th>Fit Date</th>
                                    <th class="col-links">Links</th>
                                    <th class="col-action">Action</th>
                                </tr>
                            </thead>
                            <tbody id="anthillOrdersTbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
