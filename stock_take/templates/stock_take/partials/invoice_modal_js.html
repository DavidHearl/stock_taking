<script>
// -- Shared invoice modal functions --------------------------------------------
// Included by: purchase_invoices.html, accounts_payable.html (and any future page)
// Page-specific functions required by the including template:
//   openCreateModal()    - open and reset the modal (page-specific init)
//   closeCreateModal(e)  - close (may reset page-specific state)
//   submitCreateInvoice()- form submission (different URL per page)

let modalLineCount = 0;
let modalOrderDebounce = {};
let dupCheckTimer = null;
let duplicateInvoiceId = null;
let _modalCurrency = 'GBP';

function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
}

// -- Invoice note (collapsed by default) ---------------------------------------
// The notes field is hidden behind an "Add note" button so it doesn't take up a
// permanent row. Clicking the button reveals the input; resetInvoiceNote() puts
// it back to the collapsed state when the modal is (re)opened.
function toggleInvoiceNote() {
    const row = document.getElementById('pinv-note-input-row');
    if (!row) return;
    const showing = row.style.display !== 'none';
    if (showing) {
        const input = document.getElementById('new-pinv-notes');
        if (input) input.value = '';
        resetInvoiceNote();
    } else {
        row.style.display = '';
        const toggleRow = document.getElementById('pinv-note-toggle-row');
        if (toggleRow) toggleRow.style.display = 'none';
        const input = document.getElementById('new-pinv-notes');
        if (input) input.focus();
    }
}

function resetInvoiceNote() {
    const row = document.getElementById('pinv-note-input-row');
    if (row) row.style.display = 'none';
    const toggleRow = document.getElementById('pinv-note-toggle-row');
    if (toggleRow) toggleRow.style.display = '';
}

function showInvoiceNote() {
    const row = document.getElementById('pinv-note-input-row');
    if (row) row.style.display = '';
    const toggleRow = document.getElementById('pinv-note-toggle-row');
    if (toggleRow) toggleRow.style.display = 'none';
}

function autoSetDueDate(invoiceDateVal) {
    // Set due date to the last day of the month following the invoice date.
    // e.g. 21/04/2026 -> 31/05/2026
    if (!invoiceDateVal) return;
    const dueDateEl = document.getElementById('new-pinv-due-date');
    if (!dueDateEl) return;
    const [y, m] = invoiceDateVal.split('-').map(Number);
    // First day of the month after next (two months ahead), then subtract one day
    const lastDay = new Date(y, m + 1, 0); // month+1 is 0-indexed, day 0 = last day of prev month
    dueDateEl.value = lastDay.getFullYear() + '-' +
        String(lastDay.getMonth() + 1).padStart(2, '0') + '-' +
        String(lastDay.getDate()).padStart(2, '0');
}
let modalPOSearchTimer = null;

// Apply fields extracted from a PDF to the open invoice modal.
// ex   - the `extracted` object returned by the parse endpoints.
// opts - { skipSupplier } to preserve an already-matched supplier.
function applyExtractedToModal(ex, opts) {
    opts = opts || {};
    if (!ex) return;

    // Supplier's own invoice number -> supplier reference
    if (ex.invoice_number) {
        const srEl = document.getElementById('new-pinv-supplier-ref');
        if (srEl && !srEl.value) srEl.value = ex.invoice_number;
    }

    // Currency (default GBP; only switch when the PDF clearly uses EUR)
    if (ex.currency === 'EUR') setModalCurrency('EUR');

    // Supplier (also sets the supplier's default VAT rate)
    if (ex.supplier_name && !opts.skipSupplier) selectModalSupplier(ex.supplier_name);

    // Dates
    if (ex.date) {
        const dEl = document.getElementById('new-pinv-date');
        if (dEl) dEl.value = ex.date;
    }
    if (ex.due_date) {
        const ddEl = document.getElementById('new-pinv-due-date');
        if (ddEl) ddEl.value = ex.due_date;
    } else if (ex.date) {
        autoSetDueDate(ex.date);
    }

    // Line items - or a single fallback line derived from the totals
    if (ex.line_items && ex.line_items.length > 0) {
        modalLineCount = 0;
        document.getElementById('modal-lines').innerHTML = '';
        ex.line_items.forEach(li => {
            addModalLine();
            const lastRow = document.getElementById('modal-lines').lastElementChild;
            if (!lastRow) return;
            const descInput  = lastRow.querySelector('.pinv-line-desc');
            const rateInput  = lastRow.querySelector('.pinv-line-rate');
            const totalInput = lastRow.querySelector('.pinv-line-total');
            if (descInput)  descInput.value  = li.description || '';
            if (rateInput)  rateInput.value  = li.amount != null ? li.amount : '';
            if (totalInput) totalInput.value = li.amount != null ? li.amount : '';
            if (li.description) autoLinkOrder(lastRow, li.description);
        });
        // Apply an explicit VAT rate from the PDF when one was found
        if (ex.vat_rate != null && ex.vat_rate > 0) _setModalVatRate(ex.vat_rate);
    } else if ((ex.subtotal != null && parseFloat(ex.subtotal) > 0) ||
               (ex.total != null && parseFloat(ex.total) > 0)) {
        const hasNet = ex.subtotal != null && parseFloat(ex.subtotal) > 0;
        const amount = hasNet ? parseFloat(ex.subtotal) : parseFloat(ex.total);
        modalLineCount = 0;
        document.getElementById('modal-lines').innerHTML = '';
        addModalLine();
        const row = document.getElementById('modal-lines').lastElementChild;
        if (row) {
            const desc = row.querySelector('.pinv-line-desc');
            const rate = row.querySelector('.pinv-line-rate');
            const tot  = row.querySelector('.pinv-line-total');
            if (desc) desc.value = ex.invoice_number ? ('Invoice ' + ex.invoice_number) : 'Invoice total';
            if (rate) rate.value = amount.toFixed(2);
            if (tot)  tot.value  = amount.toFixed(2);
        }
        if (hasNet && ex.vat_rate != null && ex.vat_rate > 0) {
            // Net line + VAT rate -> gross matches the PDF
            _setModalVatRate(ex.vat_rate);
        } else {
            // The single line already equals the gross total - make sure VAT
            // (possibly enabled by the supplier default) isn't added on top.
            const cb = document.getElementById('modal-vat-enabled');
            if (cb) cb.checked = false;
        }
    }

    recalcModalTotal();
}

// Show/hide the "open PO" preview button next to the PO search input
function updateModalPoOpenBtn() {
    const input = document.getElementById('new-pinv-po-search');
    const btn = document.getElementById('new-pinv-po-open');
    if (!input || !btn) return;
    const poId = input.dataset.poId || '';
    if (poId) {
        btn.href = `/purchase-order/${encodeURIComponent(poId)}/`;
        btn.style.display = '';
    } else {
        btn.removeAttribute('href');
        btn.style.display = 'none';
    }
}

function modalSearchPO(q) {
    clearTimeout(modalPOSearchTimer);
    const dd = document.getElementById('new-pinv-po-dropdown');
    const input = document.getElementById('new-pinv-po-search');
    if (!q || q.trim().length < 2) {
        if (dd) { dd.innerHTML = ''; dd.style.display = 'none'; }
        if (!q) { input.dataset.poId = ''; updateModalPoOpenBtn(); }
        return;
    }
    modalPOSearchTimer = setTimeout(() => {
        // When the invoice already has a linked supplier, only surface that
        // supplier's purchase orders — POs from other suppliers aren't relevant.
        const supplierInput = document.getElementById('new-pinv-supplier');
        const linkedSupplier = (supplierInput && supplierInput.dataset.supplierId === 'matched')
            ? supplierInput.value.trim() : '';
        const searchUrl = `/api/purchase-order-search/?q=${encodeURIComponent(q.trim())}`
            + (linkedSupplier ? `&supplier=${encodeURIComponent(linkedSupplier)}` : '');
        fetch(searchUrl, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            credentials: 'same-origin',
        })
        .then(r => r.json())
        .then(data => {
            const results = data.results || [];
            if (!results.length) {
                dd.innerHTML = '<div style="padding:8px 12px;font-size:0.82rem;color:var(--text-muted);">No purchase orders found</div>';
                dd.style.display = 'block';
                return;
            }
            dd.innerHTML = results.slice(0, 15).map(o => {
                const label = o.display_number || o.id;
                const supplier = o.supplier_name || '';
                const status = o.status ? ` <span style="opacity:.6;font-size:.75rem;">(${o.status})</span>` : '';
                return `<div style="padding:7px 12px;cursor:pointer;font-size:0.82rem;border-bottom:1px solid var(--border-color);"
                             onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background=''"
                             onclick="selectModalPOFromSearch('${o.id}','${String(label).replace(/'/g,"\\'")}','${o.po_type || 'supplier'}',{replace:true})">
                            <strong>${label}</strong>${supplier ? ` <span style="color:var(--text-secondary);"> \u2013 ${supplier}</span>` : ''}${status}
                        </div>`;
            }).join('');
            dd.style.display = 'block';
        })
        .catch(() => { dd.style.display = 'none'; });
    }, 280);
}

function selectModalPO(id, label, poType) {
    const input = document.getElementById('new-pinv-po-search');
    const dd = document.getElementById('new-pinv-po-dropdown');
    input.value = label;
    input.dataset.poId = id;
    input.dataset.poType = poType || 'supplier';
    dd.style.display = 'none';
    updateModalPoOpenBtn();
}

// User picked a PO from the search dropdown - select it and auto-pull its lines.
function selectModalPOFromSearch(id, label, poType, opts) {
    selectModalPO(id, label, poType);
    pullPOLines(Object.assign({ silent: true }, opts || {}));
}

function clearModalPO() {
    const input = document.getElementById('new-pinv-po-search');
    if (input) { input.value = ''; input.dataset.poId = ''; input.dataset.poType = ''; }
    const dd = document.getElementById('new-pinv-po-dropdown');
    if (dd) { dd.innerHTML = ''; dd.style.display = 'none'; }
    updateModalPoOpenBtn();
}

function setModalCurrency(code) {
    _modalCurrency = code;
    const btnGbp = document.getElementById('modal-btn-gbp');
    const btnEur = document.getElementById('modal-btn-eur');
    if (code === 'EUR') {
        if (btnEur) { btnEur.style.background = 'var(--primary-color)'; btnEur.style.color = '#fff'; }
        if (btnGbp) { btnGbp.style.background = 'var(--bg-primary)'; btnGbp.style.color = 'var(--text-primary)'; }
    } else {
        if (btnGbp) { btnGbp.style.background = 'var(--primary-color)'; btnGbp.style.color = '#fff'; }
        if (btnEur) { btnEur.style.background = 'var(--bg-primary)'; btnEur.style.color = 'var(--text-primary)'; }
    }
    recalcModalTotal();
}

let modalSupplierSearchTimer = null;

function modalSearchSupplier(q) {
    clearTimeout(modalSupplierSearchTimer);
    // Clear matched state when user edits the field manually
    const sinput = document.getElementById('new-pinv-supplier');
    if (sinput) { sinput.dataset.supplierId = ''; sinput.style.borderColor = ''; }
    const swarn = document.getElementById('new-pinv-supplier-warning');
    if (swarn) swarn.style.display = 'none';
    const dd = document.getElementById('new-pinv-supplier-dropdown');
    if (!q || q.trim().length < 1) {
        if (dd) { dd.innerHTML = ''; dd.style.display = 'none'; }
        return;
    }
    modalSupplierSearchTimer = setTimeout(() => {
        fetch(`/api/supplier-search/?q=${encodeURIComponent(q.trim())}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            credentials: 'same-origin',
        })
        .then(r => r.json())
        .then(data => {
            const results = data.results || [];
            if (!dd) return;
            if (!results.length) {
                dd.innerHTML = '<div style="padding:8px 12px;font-size:0.82rem;color:var(--text-muted);">No suppliers found</div>';
                dd.style.display = 'block';
                return;
            }
            dd.innerHTML = results.map(s => {
                const city = s.city ? ` <span style="color:var(--text-secondary);"> \u2013 ${s.city}</span>` : '';
                const esc = String(s.name).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                const vr = (s.vat_rate !== undefined && s.vat_rate !== null) ? s.vat_rate : 'null';
                return `<div style="padding:7px 12px;cursor:pointer;font-size:0.82rem;border-bottom:1px solid var(--border-color);"
                             onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background=''"
                             onclick="selectModalSupplier('${esc}', ${vr})">${s.name}${city}</div>`;
            }).join('');
            dd.style.display = 'block';
        })
        .catch(() => { if (dd) dd.style.display = 'none'; });
    }, 250);
}

function selectModalSupplier(name, vatRate) {
    const input = document.getElementById('new-pinv-supplier');
    const dd = document.getElementById('new-pinv-supplier-dropdown');
    if (input) {
        input.value = name;
        input.dataset.supplierId = 'matched';
        input.style.borderColor = '';
    }
    if (dd) { dd.innerHTML = ''; dd.style.display = 'none'; }
    const warn = document.getElementById('new-pinv-supplier-warning');
    if (warn) warn.style.display = 'none';
    if (vatRate !== undefined && vatRate !== null) _setModalVatRate(vatRate);
}

function _setModalVatRate(vatRate) {
    const cb        = document.getElementById('modal-vat-enabled');
    const rateInput = document.getElementById('modal-vat-rate');
    if (!cb || !rateInput) return;
    if (vatRate !== null && vatRate !== undefined && vatRate > 0) {
        rateInput.value = vatRate;
        cb.checked = true;
    } else {
        cb.checked = false;
    }
    recalcModalTotal();
}

function validateModalSupplier() {
    const input = document.getElementById('new-pinv-supplier');
    if (!input || !input.value.trim()) return;
    // If already matched via dropdown selection, skip re-check
    if (input.dataset.supplierId === 'matched') return;
    // Search for an exact match
    fetch(`/api/supplier-search/?q=${encodeURIComponent(input.value.trim())}`, {
        headers: { 'X-Requested-With': 'XMLHttpRequest' }, credentials: 'same-origin',
    })
    .then(r => r.json())
    .then(data => {
        const results = data.results || [];
        const exact = results.find(s => s.name.toLowerCase() === input.value.trim().toLowerCase());
        const warn = document.getElementById('new-pinv-supplier-warning');
        if (exact) {
            input.style.borderColor = '';
            input.dataset.supplierId = 'matched';
            if (warn) warn.style.display = 'none';
        } else {
            input.style.borderColor = 'var(--danger-color)';
            input.dataset.supplierId = '';
            if (warn) warn.style.display = 'block';
        }
    })
    .catch(() => {});
}

function clearModalSupplier() {
    const input = document.getElementById('new-pinv-supplier');
    const dd = document.getElementById('new-pinv-supplier-dropdown');
    if (input) { input.value = ''; input.dataset.supplierId = ''; input.style.borderColor = ''; }
    if (dd) { dd.innerHTML = ''; dd.style.display = 'none'; }
    const warn = document.getElementById('new-pinv-supplier-warning');
    if (warn) warn.style.display = 'none';
}

function checkDuplicateInvoiceNumber(val) {
    clearTimeout(dupCheckTimer);
    const warning = document.getElementById('modal-duplicate-warning');
    const msg     = document.getElementById('modal-duplicate-msg');
    if (!val || val.trim().length < 2) {
        warning.style.display = 'none';
        duplicateInvoiceId = null;
        return;
    }
    dupCheckTimer = setTimeout(() => {
        fetch(`/api/purchase-invoice-search/?q=${encodeURIComponent(val.trim())}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(r => r.json())
        .then(data => {
            const exact = (data.results || []).find(
                inv => inv.invoice_number.trim().toLowerCase() === val.trim().toLowerCase()
            );
            if (exact) {
                duplicateInvoiceId = exact.id;
                msg.innerHTML = `Invoice <strong>${exact.invoice_number}</strong> already exists for <strong>${exact.supplier_name}</strong>.`;
                document.getElementById('modal-duplicate-view-link').href = `/purchase-invoices/${exact.id}/`;
                // Only show "Mark as Processed" when we're in the AP modal (currentEmailId is set)
                const processBtn = document.getElementById('modal-duplicate-process-btn');
                if (processBtn) processBtn.style.display = (typeof currentEmailId !== 'undefined' && currentEmailId) ? 'inline-block' : 'none';
                warning.style.display = 'block';
            } else {
                duplicateInvoiceId = null;
                warning.style.display = 'none';
            }
        })
        .catch(() => { warning.style.display = 'none'; });
    }, 350);
}

function linkDuplicateAndProcess() {
    if (!duplicateInvoiceId || typeof currentEmailId === 'undefined' || !currentEmailId) return;
    const btn = document.getElementById('modal-duplicate-process-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Saving\u2026';
    fetch(`/accounts-payable/${currentEmailId}/link-invoice/`, {
        method: 'POST',
        headers: { 'X-CSRFToken': (typeof CSRF_TOKEN !== 'undefined' ? CSRF_TOKEN : ''), 'Content-Type': 'application/json' },
        body: JSON.stringify({ invoice_id: duplicateInvoiceId }),
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            window.location.href = data.redirect;
        } else {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-lg"></i> Mark as Processed';
            alert('Error: ' + (data.error || 'Unknown error'));
        }
    })
    .catch(() => {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-lg"></i> Mark as Processed';
        alert('Network error');
    });
}

function previewAttachment(attachmentId) {
    if (typeof currentEmailId === 'undefined' || !currentEmailId) return;
    window.open(`/accounts-payable/${currentEmailId}/attachment/${encodeURIComponent(attachmentId)}/`, '_blank');
}

function addModalLine() {
    const idx = modalLineCount++;
    const container = document.getElementById('modal-lines');
    const row = document.createElement('div');
    row.className = 'pinv-line-row';
    row.dataset.lineIdx = idx;
    row.innerHTML = `
        <div style="display:flex;gap:6px;align-items:center;">
            <input type="text" placeholder="Description" class="pinv-input pinv-line-desc" style="flex:2;min-width:0;">
            <input type="number" placeholder="1" step="any" min="0" value="1"
                   class="pinv-input pinv-line-qty"
                   style="width:50px;padding:5px 8px;font-size:0.82rem;text-align:right;"
                   oninput="recalcLineTotal(this.closest('.pinv-line-row'))">
            <input type="number" placeholder="0.00" step="0.01" min="0" value=""
                   class="pinv-input pinv-line-rate"
                   style="width:90px;padding:5px 8px;font-size:0.82rem;text-align:right;"
                   oninput="recalcLineTotal(this.closest('.pinv-line-row'))">
            <input type="number" placeholder="0.00" step="0.01" min="0" value=""
                   class="pinv-input pinv-line-total"
                   style="width:90px;padding:5px 8px;font-size:0.82rem;text-align:right;"
                   oninput="recalcLineRate(this.closest('.pinv-line-row'))">
            <button type="button" class="pinv-btn-icon pinv-line-drag-handle" title="Drag to reorder" style="cursor:grab;">
                <i class="bi bi-grip-vertical"></i>
            </button>
            <button type="button" class="kebab-trigger pinv-kebab-trigger" onclick="toggleLineKebab(this)" title="More options">
                <i class="bi bi-three-dots-vertical"></i>
            </button>
        </div>
        <div class="pinv-order-subrow" style="display:none;padding:3px 0 4px 2px;">
            <div style="position:relative;max-width:320px;">
                <input type="text" class="pinv-input pinv-line-order-input"
                       style="width:100%;padding:5px 8px;font-size:0.82rem;box-sizing:border-box;"
                       placeholder="Link to order\u2026" autocomplete="off" data-order-id=""
                       oninput="modalSearchOrders(this,${idx})">
                <div class="order-search-dropdown modal-order-dd" id="modal-order-dd-${idx}"></div>
            </div>
        </div>`;
    container.appendChild(row);
}

let _kebabTargetBtn = null, _kebabTargetRow = null;

function toggleLineKebab(btn) {
    const portal = document.getElementById('pinv-kebab-portal');
    if (portal.style.display !== 'none' && _kebabTargetBtn === btn) {
        _closeKebabPortal();
        return;
    }
    _kebabTargetBtn = btn;
    _kebabTargetRow = btn.closest('.pinv-line-row');
    const orderInput = _kebabTargetRow.querySelector('.pinv-line-order-input');
    const hasOrder = orderInput && orderInput.dataset.orderId;
    portal.innerHTML = `
        <button type="button" class="kebab-item" data-action="copy">
            <i class="bi bi-copy"></i> Copy line
        </button>
        <button type="button" class="kebab-item" data-action="split">
            <i class="bi bi-scissors"></i> Split line
        </button>
        <div class="kebab-divider"></div>
        <button type="button" class="kebab-item" data-action="order">
            <i class="bi bi-${hasOrder ? 'link-slash' : 'link-45deg'}"></i>
            ${hasOrder ? 'Unlink order' : 'Link to order\u2026'}
        </button>
        <div class="kebab-divider"></div>
        <button type="button" class="kebab-item kebab-item-danger" data-action="delete">
            <i class="bi bi-trash"></i> Delete line
        </button>`;
    portal.style.display = 'block';
    const rect = btn.getBoundingClientRect();
    const menuH = portal.offsetHeight || 180;
    const spaceBelow = window.innerHeight - rect.bottom;
    portal.style.top  = (spaceBelow >= menuH + 8 ? rect.bottom + 3 : rect.top - menuH - 3) + 'px';
    portal.style.right = (window.innerWidth - rect.right) + 'px';
}

function _closeKebabPortal() {
    const portal = document.getElementById('pinv-kebab-portal');
    if (portal) { portal.style.display = 'none'; portal.innerHTML = ''; }
    _kebabTargetBtn = null;
    _kebabTargetRow = null;
}

function toggleOrderRow(row) {
    const subrow = row.querySelector('.pinv-order-subrow');
    const input  = subrow.querySelector('.pinv-line-order-input');
    if (subrow.style.display === 'none') {
        subrow.style.display = '';
        input.focus();
    } else {
        input.value = '';
        input.dataset.orderId = '';
        subrow.style.display = 'none';
    }
}

function showOrderRow(row) {
    const subrow = row.querySelector('.pinv-order-subrow');
    if (subrow) subrow.style.display = '';
}

function addFreightLine() {
    addModalLine();
    const rows = document.querySelectorAll('.pinv-line-row');
    const row = rows[rows.length - 1];
    row.dataset.isCarriage = '1';
    row.querySelector('.pinv-line-desc').value = 'Carriage';
    row.querySelector('.pinv-line-qty').value = '1';
    row.querySelector('.pinv-line-rate').focus();
}

function addDayRateLine() {
    addModalLine();
    const rows = document.querySelectorAll('.pinv-line-row');
    const row = rows[rows.length - 1];
    row.querySelector('.pinv-line-desc').value = 'Day Rate';
    row.querySelector('.pinv-line-qty').value = '1';

    const poInput = document.getElementById('new-pinv-po-search');
    const poId    = poInput ? poInput.dataset.poId : '';
    const poType  = poInput ? poInput.dataset.poType : '';

    if (poId && poType === 'fitter') {
        fetch(`/api/po-lines/?workguru_id=${encodeURIComponent(poId)}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            credentials: 'same-origin',
        })
        .then(r => r.json())
        .then(data => {
            const results = data.results || [];
            if (results.length) {
                const rate = parseFloat(results[0].order_price) || 0;
                if (rate > 0) {
                    row.querySelector('.pinv-line-rate').value  = rate.toFixed(2);
                    row.querySelector('.pinv-line-total').value = rate.toFixed(2);
                    recalcModalTotal();
                }
            }
            row.querySelector('.pinv-line-rate').focus();
        })
        .catch(() => row.querySelector('.pinv-line-rate').focus());
    } else {
        row.querySelector('.pinv-line-rate').focus();
    }
}

function addSurchargeLine() {
    addModalLine();
    const rows = document.querySelectorAll('.pinv-line-row');
    const row = rows[rows.length - 1];
    row.dataset.isSurcharge = '1';
    row.querySelector('.pinv-line-desc').value = 'Surcharge';
    row.querySelector('.pinv-line-qty').value = '1';
    row.querySelector('.pinv-line-rate').focus();
}

function recalcLineTotal(row) {
    const qty  = parseFloat(row.querySelector('.pinv-line-qty').value) || 1;
    const rate = parseFloat(row.querySelector('.pinv-line-rate').value) || 0;
    row.querySelector('.pinv-line-total').value = (qty * rate).toFixed(2);
    recalcModalTotal();
}

function recalcLineRate(row) {
    const qty   = parseFloat(row.querySelector('.pinv-line-qty').value) || 1;
    const total = parseFloat(row.querySelector('.pinv-line-total').value) || 0;
    row.querySelector('.pinv-line-rate').value = (qty > 0 ? total / qty : 0).toFixed(2);
    recalcModalTotal();
}

function recalcModalTotal() {
    let net = 0;
    document.querySelectorAll('.pinv-line-row').forEach(row => {
        net += parseFloat(row.querySelector('.pinv-line-total').value) || 0;
    });
    const sym = (_modalCurrency === 'EUR') ? '\u20ac' : '\u00a3';
    const vatEnabled = document.getElementById('modal-vat-enabled')?.checked;
    const vatRate    = parseFloat(document.getElementById('modal-vat-rate')?.value) || 0;
    let discount     = parseFloat(document.getElementById('modal-discount')?.value) || 0;
    if (discount < 0) discount = 0;
    const preVat     = document.getElementById('modal-discount-pre-vat')?.checked;
    const netRow = document.getElementById('modal-net-row');
    const vatRow = document.getElementById('modal-vat-row');
    const vatLbl = document.getElementById('modal-vat-label');
    const discRow = document.getElementById('modal-discount-row');
    const discLbl = document.getElementById('modal-discount-label');
    const discAmt = document.getElementById('modal-discount-amount');

    const discCur = document.querySelector('.pinv-discount-cur');
    if (discCur) discCur.textContent = sym;

    if (discount > 0) {
        if (discRow) discRow.style.display = 'flex';
        if (discLbl) discLbl.textContent = 'Discount (' + (preVat ? 'pre-VAT' : 'post-VAT') + ')';
        if (discAmt) discAmt.textContent = '\u2212' + sym + discount.toFixed(2);
    } else if (discRow) {
        discRow.style.display = 'none';
    }

    const applyVat = !!(vatEnabled && vatRate > 0);
    let vatAmt = 0, total = 0;
    if (preVat) {
        const taxable = net - discount;
        vatAmt = applyVat ? taxable * vatRate / 100 : 0;
        total  = taxable + vatAmt;
    } else {
        vatAmt = applyVat ? net * vatRate / 100 : 0;
        total  = net + vatAmt - discount;
    }
    if (total < 0) total = 0;

    if (applyVat) {
        if (netRow) netRow.style.display = 'flex';
        if (vatRow) vatRow.style.display = 'flex';
        if (vatLbl) vatLbl.textContent = `VAT (${vatRate}%)`;
        document.getElementById('modal-net-total').textContent  = sym + net.toFixed(2);
        document.getElementById('modal-vat-amount').textContent = sym + vatAmt.toFixed(2);
    } else {
        if (netRow) netRow.style.display = (discount > 0) ? 'flex' : 'none';
        if (vatRow) vatRow.style.display = 'none';
        document.getElementById('modal-net-total').textContent = sym + net.toFixed(2);
    }
    document.getElementById('modal-total').textContent = sym + total.toFixed(2);
}

function splitModalLine(row) {
    const n = parseInt(prompt('Split into how many equal lines?', '3'), 10);
    if (!n || n < 2 || n > 20) return;
    const desc  = row.querySelector('.pinv-line-desc').value.trim();
    const total = parseFloat(row.querySelector('.pinv-line-total').value) || 0;
    const each  = parseFloat((total / n).toFixed(2));
    row.remove();
    for (let i = 0; i < n; i++) {
        addModalLine();
        const rows = document.querySelectorAll('.pinv-line-row');
        const newRow = rows[rows.length - 1];
        newRow.querySelector('.pinv-line-desc').value  = desc;
        newRow.querySelector('.pinv-line-qty').value   = '1';
        newRow.querySelector('.pinv-line-rate').value  = each.toFixed(2);
        newRow.querySelector('.pinv-line-total').value = each.toFixed(2);
    }
    recalcModalTotal();
}

async function autoLinkOrder(row, description) {
    const stopWords = new Set([
        'with','that','this','from','have','will','date','rate','each','line',
        'monday','tuesday','wednesday','thursday','friday','saturday','sunday',
        'january','february','march','april','june','july','august','september','october','november','december',
        'refit','home','improvements','trading','limited','services','expenses','invoicing'
    ]);
    const words = description.toLowerCase()
        .replace(/[^a-z\s]/g, ' ')
        .split(/\s+/)
        .filter(w => w.length >= 4 && !stopWords.has(w));
    for (const word of words) {
        try {
            const resp = await fetch(`/api/order-search/?q=${encodeURIComponent(word)}`, {
                headers: { 'X-Requested-With': 'XMLHttpRequest' },
                credentials: 'same-origin'
            });
            const data = await resp.json();
            if (data.results && data.results.length === 1) {
                const o = data.results[0];
                const input = row.querySelector('.pinv-line-order-input');
                if (input) {
                    selectModalOrder(input, row.dataset.lineIdx, o.id, o.sale_number, o.customer_name);
                    showOrderRow(row);
                }
                return;
            }
        } catch(e) {}
    }
}

function copyModalLine(row) {

    const rows = document.querySelectorAll('.pinv-line-row');
    const newRow = rows[rows.length - 1];
    newRow.querySelector('.pinv-line-desc').value  = row.querySelector('.pinv-line-desc').value;
    newRow.querySelector('.pinv-line-qty').value   = row.querySelector('.pinv-line-qty').value;
    newRow.querySelector('.pinv-line-rate').value  = row.querySelector('.pinv-line-rate').value;
    newRow.querySelector('.pinv-line-total').value = row.querySelector('.pinv-line-total').value;
    const srcInput = row.querySelector('.pinv-line-order-input');
    const dstInput = newRow.querySelector('.pinv-line-order-input');
    if (srcInput && dstInput) {
        dstInput.value = srcInput.value;
        dstInput.dataset.orderId = srcInput.dataset.orderId || '';
        dstInput.dataset.orderNumber = srcInput.dataset.orderNumber || '';
        if (srcInput.dataset.orderId) showOrderRow(newRow);
    }
    recalcModalTotal();
}

function autoPopulateFromFilename(filename) {
    const nameNoExt = filename.replace(/\.[^/.]+$/, '');
    const dateInput = document.getElementById('new-pinv-date');

    if (!dateInput.value) {
        let dateMatch = nameNoExt.match(/(\d{4})[-_]?(\d{2})[-_]?(\d{2})/);
        if (dateMatch) {
            const y = parseInt(dateMatch[1]), m = parseInt(dateMatch[2]), d = parseInt(dateMatch[3]);
            if (y >= 2000 && y <= 2099 && m >= 1 && m <= 12 && d >= 1 && d <= 31) {
                dateInput.value = `${dateMatch[1]}-${dateMatch[2]}-${dateMatch[3]}`;
            }
        }
        if (!dateInput.value) {
            dateMatch = nameNoExt.match(/(\d{2})[-_](\d{2})[-_](\d{4})/);
            if (dateMatch) {
                const d = parseInt(dateMatch[1]), m = parseInt(dateMatch[2]), y = parseInt(dateMatch[3]);
                if (y >= 2000 && y <= 2099 && m >= 1 && m <= 12 && d >= 1 && d <= 31) {
                    dateInput.value = `${dateMatch[3]}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                }
            }
        }
    }
    // Try to match supplier name from filename via API
    const supplierInput = document.getElementById('new-pinv-supplier');
    if (supplierInput && !supplierInput.value.trim()) {
        const lowerName = nameNoExt.toLowerCase().replace(/[_-]/g, ' ');
        fetch(`/api/supplier-search/?q=${encodeURIComponent(lowerName.split(' ')[0])}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            credentials: 'same-origin',
        })
        .then(r => r.json())
        .then(data => {
            const results = data.results || [];
            for (const s of results) {
                if (lowerName.includes(s.name.toLowerCase())) {
                    selectModalSupplier(s.name, s.vat_rate !== undefined ? s.vat_rate : null);
                    break;
                }
            }
        })
        .catch(() => {});
    }
}

let iopoSupplierTimer = null;

function openInlineOPOModal(prefill) {
    // Pre-fill supplier from the invoice modal if one is set
    const invSupplier = document.getElementById('new-pinv-supplier');
    const iopoSupplier = document.getElementById('iopo-supplier');
    if (invSupplier && iopoSupplier && invSupplier.value.trim()) {
        iopoSupplier.value = invSupplier.value.trim();
    }
    // Default date to today
    const dateEl = document.getElementById('iopo-date');
    if (dateEl && !dateEl.value) dateEl.value = todayISO();

    if (prefill) {
        if (prefill.gross != null) {
            const grossEl = document.getElementById('iopo-gross');

            if (grossEl) grossEl.value = prefill.gross.toFixed(2);
            if (netEl)   netEl.value   = prefill.gross.toFixed(2); // net = gross (labour invoice, no VAT assumed)
            document.getElementById('iopo-vat').value = '0.00';

        if (prefill.description) {
            document.getElementById('iopo-description').value = prefill.description;
        }
        if (prefill.date) {

            if (d) d.value = prefill.date;
        }
    }

    const err = document.getElementById('iopo-error');

    const btn = document.getElementById('iopo-submit-btn');

}

function openInlineOPOFromLines() {
    // Collect current line items from the invoice modal
    const lines = [];
    let total = 0;
    document.querySelectorAll('#modal-lines .pinv-line-row').forEach(row => {
        const desc = (row.querySelector('.pinv-line-desc')?.value || '').trim();
        const amount = parseFloat(row.querySelector('.pinv-line-rate')?.value) || 0;

    iopoCalcGross();
}

function iopoCalcGross() {
    const net = parseFloat(document.getElementById('iopo-net').value) || 0;
    const vat = parseFloat(document.getElementById('iopo-vat').value) || 0;
    document.getElementById('iopo-gross').value = (net + vat).toFixed(2);

function submitInlineOPO() {
    const supplier = document.getElementById('iopo-supplier').value.trim();
    if (!supplier) {
        const err = document.getElementById('iopo-error');
        err.textContent = 'Supplier is required.';
        err.style.display = 'block';
        return;
    }
    const btn = document.getElementById('iopo-submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Creating\u2026';

    const payload = {
        supplier_name: supplier,
        category:      document.getElementById('iopo-category').value,
        status:        'draft',
        date:          document.getElementById('iopo-date').value || null,
        expected_date: null,
        amount_net:    document.getElementById('iopo-net').value || '0',
        amount_vat:    document.getElementById('iopo-vat').value || '0',
        amount_gross:  document.getElementById('iopo-gross').value || '0',
        gl_code:       document.getElementById('iopo-gl-code').value || '',
        description:   document.getElementById('iopo-description').value.trim(),
        notes:         '',
    };

    fetch("{% url 'overhead_po_create' %}", {
        method: 'POST',
        headers: {
            'X-CSRFToken': (typeof CSRF_TOKEN !== 'undefined' ? CSRF_TOKEN : document.cookie.match(/csrftoken=([^;]+)/)?.[1] || ''),
            'Content-Type': 'application/json',
        },
        credentials: 'same-origin',
        body: JSON.stringify(payload),
    })
    .then(r => r.json())
    .then(data => {
        if (data.success && data.po) {
            // Auto-fill the PO search field in the invoice modal
            const poInput = document.getElementById('new-pinv-po-search');
            if (poInput) {
                poInput.value = data.po.reference;
                poInput.dataset.poId = data.po.id;
                if (typeof updateModalPoOpenBtn === 'function') updateModalPoOpenBtn();
            }
            // Also fill supplier in invoice modal if empty
            const invSupplier = document.getElementById('new-pinv-supplier');
            if (invSupplier && !invSupplier.value.trim() && data.po.supplier_name) {
                invSupplier.value = data.po.supplier_name;
                invSupplier.dataset.supplierId = 'matched';
            }
            document.getElementById('inline-opo-modal').classList.remove('open');
        } else {
            const err = document.getElementById('iopo-error');
            err.textContent = data.error || 'Failed to create OPO. Please try again.';
            err.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-lg"></i> Create OPO';
        }
    })
    .catch(() => {
        const err = document.getElementById('iopo-error');
        err.textContent = 'Network error. Please try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-lg"></i> Create OPO';
    });
}

// -- Pull line items from the selected PO --------------------------------------
// opts.silent - suppress alert() popups (used for auto-pull on PO selection).
function pullPOLines(opts) {
    const silent = !!(opts && opts.silent);
    const poInput = document.getElementById('new-pinv-po-search');
    const poId = poInput ? poInput.dataset.poId : '';
    if (!poId) {
        if (!silent) alert('Select a purchase order first.');
        return;
    }
    fetch(`/api/po-lines/?workguru_id=${encodeURIComponent(poId)}`, {
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        credentials: 'same-origin',
    })
    .then(r => r.json().catch(() => { throw new Error(`Server returned ${r.status}`); }))
    .then(data => {
        if (data.error) { if (!silent) alert('Could not load PO lines: ' + data.error); return; }
        const results = data.results || [];
        // A manual PO change (picked from the dropdown) replaces every line with
        // the newly selected PO's lines — even if that PO has none — so lines
        // from the previously selected PO never linger.
        const forceReplace = !!(opts && opts.replace);
        if (!results.length) {
            if (forceReplace) {
                document.getElementById('modal-lines').innerHTML = '';
                modalLineCount = 0;
                recalcModalTotal();
            }
            if (!silent) alert('No line items found on this purchase order.');
            return;
        }

        // -- Snapshot existing rows so we can preserve unmatched ones (e.g. surcharges) --
        const existingRows = Array.from(document.querySelectorAll('.pinv-line-row'));
        let existingSnapshots = existingRows.map(row => ({
            desc:        (row.querySelector('.pinv-line-desc')?.value  || '').trim(),
            qty:         parseFloat(row.querySelector('.pinv-line-qty')?.value  || 0),
            rate:        parseFloat(row.querySelector('.pinv-line-rate')?.value || 0),
            total:       row.querySelector('.pinv-line-total')?.value || '',
            poProductId: row.dataset.poProductId || '',
            isCarriage:  row.dataset.isCarriage  || '',
            isSurcharge: row.dataset.isSurcharge || '',
        }));

        // If the user manually switched POs, or any current line was already
        // imported from a PO, this pull replaces every line with the newly
        // selected PO's lines rather than merging — so stale lines from the
        // previous PO don't linger and have to be deleted by hand. (On the first
        // automatic pull the existing rows are PDF / manual lines, which we still
        // enrich & preserve.)
        const isPoSwitch = forceReplace || existingSnapshots.some(s => s.poProductId);
        if (isPoSwitch) existingSnapshots = [];

        // Clear and rebuild
        document.getElementById('modal-lines').innerHTML = '';
        modalLineCount = 0;

        // Normalise a description for loose matching (lowercase, collapse whitespace)
        const norm = s => s.toLowerCase().replace(/\s+/g, ' ').trim();

        // Extract 3-4 digit integers - panel dimensions like 2206, 599, 210, 458 etc.
        // Used to match cryptic PDF descriptions ("2206 599 1 280.85") to PO names ("(2206x599mm)").
        const extractDims = s => new Set((s.match(/\b\d{3,4}\b/g) || []));
        const countSharedDims = (a, b) => { let n = 0; for (const d of a) if (b.has(d)) n++; return n; };

        // Track which existing snapshots were matched to a PO line
        const matchedExistingIndices = new Set();

        results.forEach(item => {
            const orderQty    = parseFloat(item.quantity || 1);
            const invoicedQty = parseFloat(item.invoiced_qty || 0);
            const remaining   = Math.max(0, orderQty - invoicedQty);
            const rate        = parseFloat(item.order_price || 0);
            const itemNorm    = norm(item.description || item.name || '');
            const itemDims    = extractDims(itemNorm);

            // Try to find a matching existing row:
            //   1. Exact or containment description match
            //   2. Same unit rate
            //   3. 2+ shared 3-4 digit integers (panel dimensions, e.g. 2206 and 599 in "2206 599 1 280.85" vs "(2206x599mm)")
            let matchIdx = -1;
            for (let i = 0; i < existingSnapshots.length; i++) {
                if (matchedExistingIndices.has(i)) continue;
                const snap = existingSnapshots[i];
                if (snap.poProductId) continue; // already linked to a PO product, skip
                const snapNorm  = norm(snap.desc);
                // Accept exact, or containment in either direction (e.g. "surcharge" within "surcharge from invoice INV-xxx")
                const descMatch = itemNorm && snapNorm && (
                    snapNorm === itemNorm ||
                    itemNorm.includes(snapNorm) ||
                    snapNorm.includes(itemNorm)
                );
                const rateMatch = rate > 0 && snap.rate === rate;
                const dimMatch  = countSharedDims(itemDims, extractDims(snapNorm)) >= 2;
                if (descMatch || rateMatch || dimMatch) { matchIdx = i; break; }
            }

            addModalLine();
            const rows = document.querySelectorAll('.pinv-line-row');
            const row  = rows[rows.length - 1];

            if (matchIdx !== -1) {
                // Description from the PO (clean product name), financial values from the invoice PDF
                const snap = existingSnapshots[matchIdx];
                matchedExistingIndices.add(matchIdx);
                const invoiceQty   = snap.qty > 0 ? snap.qty : remaining;
                const invoiceRate  = snap.rate > 0 ? snap.rate : rate;
                const invoiceTotal = snap.total || (invoiceQty * invoiceRate).toFixed(2);
                row.querySelector('.pinv-line-desc').value  = item.description || item.name || snap.desc || '';
                row.querySelector('.pinv-line-qty').value   = invoiceQty;
                row.querySelector('.pinv-line-rate').value  = invoiceRate.toFixed(2);
                row.querySelector('.pinv-line-total').value = invoiceTotal;
            } else {
                row.querySelector('.pinv-line-desc').value  = item.description || item.name || '';
                row.querySelector('.pinv-line-qty').value   = remaining;
                row.querySelector('.pinv-line-rate').value  = rate.toFixed(2);
                row.querySelector('.pinv-line-total').value = (remaining * rate).toFixed(2);
            }
            row.dataset.poProductId = item.id;
            if (invoicedQty > 0) {
                const label = remaining <= 0
                    ? `Fully invoiced (${invoicedQty} of ${orderQty}) \u2014 adjust qty if this invoice covers an additional charge`
                    : `${invoicedQty} of ${orderQty} already invoiced`;
                row.title = label;
                row.classList.add('pinv-line-partial');
            }
        });

        // Append any existing rows that were NOT matched to a PO line (e.g. surcharges from PDF)
        existingSnapshots.forEach((snap, i) => {
            if (matchedExistingIndices.has(i)) return;
            // Drop rows that were imported from a (previous) PO. The freshly
            // pulled PO lines above already replace them, so keeping them would
            // leave stale line items behind when switching to a different PO.
            if (snap.poProductId) return;
            // Skip blank rows (e.g. the default empty line the modal opens with) so they
            // don't get re-added as an empty extra line that has to be manually deleted.
            const isBlank = !snap.desc && !(snap.qty > 0) && !(snap.rate > 0)
                && !snap.poProductId && !snap.isCarriage && !snap.isSurcharge;
            if (isBlank) return;
            addModalLine();
            const rows = document.querySelectorAll('.pinv-line-row');
            const row  = rows[rows.length - 1];
            row.querySelector('.pinv-line-desc').value  = snap.desc;
            row.querySelector('.pinv-line-qty').value   = snap.qty;
            row.querySelector('.pinv-line-rate').value  = snap.rate.toFixed(2);
            row.querySelector('.pinv-line-total').value = snap.total;
            if (snap.poProductId) row.dataset.poProductId = snap.poProductId;
            if (snap.isCarriage)  row.dataset.isCarriage  = snap.isCarriage;
            if (snap.isSurcharge) row.dataset.isSurcharge = snap.isSurcharge;
        });
        if (data.freight_cost && parseFloat(data.freight_cost) > 0) {
            addModalLine();
            const rows = document.querySelectorAll('.pinv-line-row');
            const row = rows[rows.length - 1];
            const fc = parseFloat(data.freight_cost).toFixed(2);
            row.querySelector('.pinv-line-desc').value  = 'Carriage';
            row.querySelector('.pinv-line-qty').value   = '1';
            row.querySelector('.pinv-line-rate').value  = fc;
            row.querySelector('.pinv-line-total').value = fc;
            row.dataset.isCarriage = '1';
        }
        recalcModalTotal();
    })
    .catch(err => { if (!silent) alert('Error fetching PO lines: ' + err.message); });
}

// -- Push current invoice line items onto the selected PO ----------------------
// Adds the modal's line items to the linked PO as product lines. Lines already
// sourced from the PO (those carrying a poProductId) are skipped to avoid dupes.
function pushPOLines() {
    const poInput = document.getElementById('new-pinv-po-search');
    const poId = poInput ? poInput.dataset.poId : '';
    if (!poId) {
        alert('Select a purchase order first.');
        return;
    }

    const lines = [];
    document.querySelectorAll('#modal-lines .pinv-line-row').forEach(row => {
        // Skip lines that already came from the PO so we don't duplicate them.
        if (row.dataset.poProductId) return;
        const name = (row.querySelector('.pinv-line-desc')?.value || '').trim();
        const qty  = parseFloat(row.querySelector('.pinv-line-qty')?.value) || 0;
        const rate = parseFloat(row.querySelector('.pinv-line-rate')?.value) || 0;
        if (!name && !qty && !rate) return;
        lines.push({ name, order_quantity: qty || 1, order_price: rate });
    });

    if (!lines.length) {
        alert('No new lines to push to the PO.');
        return;
    }

    // Stash the pending push and open the confirmation modal.
    _pushLinesPending = { poId, lines };
    const msg = document.getElementById('push-lines-message');
    if (msg) {
        msg.textContent = `Push ${lines.length} line${lines.length === 1 ? '' : 's'} to the selected PO?`;
    }
    const btn = document.getElementById('push-lines-confirm-btn');
    if (btn) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-upload"></i> Push Lines';
    }
    document.getElementById('push-lines-modal').classList.add('open');
}

let _pushLinesPending = null;

function closePushLinesModal(evt) {
    if (evt && evt.target !== document.getElementById('push-lines-modal')) return;
    document.getElementById('push-lines-modal').classList.remove('open');
    _pushLinesPending = null;
}

function confirmPushPOLines() {
    if (!_pushLinesPending) return;
    const { poId, lines } = _pushLinesPending;

    const btn = document.getElementById('push-lines-confirm-btn');
    if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Pushing\u2026';
    }

    const csrf = (typeof CSRF_TOKEN !== 'undefined' ? CSRF_TOKEN : '')
        || document.querySelector('[name=csrfmiddlewaretoken]')?.value
        || document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';

    fetch(`/purchase-order/${encodeURIComponent(poId)}/push-lines/`, {
        method: 'POST',
        headers: { 'X-CSRFToken': csrf, 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ lines }),
    })
    .then(r => r.json().catch(() => { throw new Error(`Server returned ${r.status}`); }))
    .then(data => {
        if (data.error) { alert('Could not push lines: ' + data.error); return; }
        document.getElementById('push-lines-modal').classList.remove('open');
        _pushLinesPending = null;
        alert(`Pushed ${data.added} line${data.added === 1 ? '' : 's'} to the PO.`);
    })
    .catch(err => alert('Error pushing lines: ' + err.message))
    .finally(() => {
        if (btn) {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-upload"></i> Push Lines';
        }
    });
}
</script>
