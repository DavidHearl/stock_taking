{% extends "auth_base.html" %}
{% load i18n %}
{% block title %}{% trans "Sign Out" %} - ATLAS{% endblock %}

{% block extra_css %}
<style>
	.btn-signout {
		display: block;
		width: 100%;
		padding: 14px;
		background: rgba(220, 53, 69, 0.12);
		border: 1px solid rgba(220, 53, 69, 0.25);
		border-radius: 100px;
		color: #f07080;
		font-size: 0.95rem;
		font-weight: 700;
		cursor: pointer;
		transition: background 0.2s, box-shadow 0.2s;
		letter-spacing: 0.02em;
	}
	.btn-signout:hover {
		background: rgba(220, 53, 69, 0.22);
		box-shadow: 0 6px 20px rgba(220, 53, 69, 0.18);
	}
</style>
{% endblock %}

{% block content %}
	<div class="auth-card-body" style="text-align: center;">
		<p class="auth-page-title">{% trans "Sign Out" %}</p>
		<p class="auth-page-subtitle">{% trans "Are you sure you want to sign out?" %}</p>
		<form method="post" action="">
			{% csrf_token %}
			<button type="submit" class="btn-signout">{% trans "Sign Out" %}</button>
		</form>
	</div>
	<div class="auth-card-footer">
		<a href="{% url 'dashboard' %}">{% trans "Go back" %}</a>
	</div>
{% endblock %}
